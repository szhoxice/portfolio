<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Проекты — Давид Миралиев</title>
    <meta name="description" content="HelpOnWheels, МДПС Verify, сайты на заказ — проекты Давида Миралиева." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css?v=pc-sync-1" />
  </head>
  <body class="is-inverted">
    <div class="bg-grain" aria-hidden="true"></div>
    <canvas id="bgParticles" class="bg-particles" aria-hidden="true"></canvas>
    <div class="cursor" aria-hidden="true">
      <div class="cursor__dot"></div>
      <div class="cursor__ring"></div>
    </div>

    <header class="topbar" data-animate="fade">
      <a class="topbar__home" href="index.html" aria-label="На главную" data-cursor-link>
        <img class="topbar__home-img" src="assets/images/david.jpg" alt="" width="48" height="48" decoding="async" />
      </a>
      <div class="topbar__mid">
        <a class="nav__link nav__link--home" href="index.html" data-cursor-link>Главная</a>
        <nav class="nav" aria-label="Разделы сайта">
          <a class="nav__link" href="about.html" data-cursor-link>Обо мне</a>
          <a class="nav__link" href="projects.html" aria-current="page" data-cursor-link>Проекты</a>
          <a class="nav__link" href="skills.html" data-cursor-link>Навыки</a>
          <a class="nav__link" href="contact.html" data-cursor-link>Контакты</a>
        </nav>
      </div>
      <div class="topbar__actions">
        <button class="btn btn--ghost" type="button" id="themeToggle" aria-label="Инвертировать тему">
          <span class="btn__label">Ч/Б</span>
          <span class="btn__hint">инверсия</span>
        </button>
      </div>
    </header>

    <main class="page page--sub">
      <section class="section section--dark section--first">
        <div class="container">
          <div class="section__top" data-animate="reveal">
            <h1 class="h2 h2--invert">Проекты</h1>
            <p class="lead lead--invert">
              Боты в Telegram, заказная вёрстка и это портфолио. Нажми на карточку — откроется описание.
            </p>
          </div>
          <div class="projectsGrid" id="projectsGrid" aria-label="Список проектов"></div>
        </div>
      </section>

      <footer class="footer footer--page" data-animate="fade">
        <div class="container footer__inner footer__inner--center">
          <p class="footer__copyright mono mono--muted">
            © 2026 Портфолио - Студента последнего курса Миралиева Давида
          </p>
        </div>
      </footer>
    </main>

    <div class="modalOverlay" id="projectModalOverlay" aria-hidden="true"></div>
    <div class="modal" id="projectModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
      <div class="modal__top">
        <div class="modal__titleBlock">
          <div class="modal__eyebrow mono mono--muted" id="modalEyebrow"></div>
          <h2 class="modal__title" id="modalTitle"></h2>
        </div>
        <button class="iconBtn" type="button" id="modalClose" aria-label="Закрыть">
          <span aria-hidden="true">✕</span>
        </button>
      </div>
      <p class="modal__desc" id="modalDesc"></p>
      <div class="modal__tags" id="modalTags"></div>
      <div class="modal__grid">
        <div class="modal__preview" aria-hidden="true">
          <div class="modalPreview">
            <div class="modalPreview__frame">
              <img class="modalPreview__cover" id="modalCoverImg" alt="" width="800" height="500" hidden />
              <div class="modalPreview__lines" id="modalPreviewLines"></div>
            </div>
          </div>
        </div>
        <ul class="modal__bullets" id="modalBullets"></ul>
      </div>
      <div class="modal__actions">
        <a class="btn btn--secondary" href="#" id="modalDemoLink" data-cursor-link>
          <span class="btn__label">Ссылка</span>
          <span class="btn__arrow" aria-hidden="true">↗</span>
        </a>
      </div>
    </div>

    <script src="js/app.js?v=pc-sync-1"></script>
    <script src="js/particles-bg.js?v=pc-sync-1"></script>
  </body>
</html>
